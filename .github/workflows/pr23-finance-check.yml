name: PR23 Finance Workspace Check

on:
  push:
    branches:
      - pr-23-remittance-sheet-sync-expense-categories
  pull_request:
    branches:
      - pr-22-admin-password-reset
    paths:
      - 'server/**'
      - 'src/**'
      - 'prisma/**'
      - 'integrations/**'
      - 'package.json'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Generate Prisma Client
        run: npm run db:generate
      - name: Production build and checks
        run: npm run build
