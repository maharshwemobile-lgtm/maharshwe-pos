<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#13a36f" />
    <title>Mahar Shwe Mobile POS</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" href="./maharshwe-logo.png" />
    <link rel="shortcut icon" type="image/png" href="./maharshwe-logo.png" />
    <link rel="apple-touch-icon" href="./maharshwe-logo.png" />
    <link rel="stylesheet" href="./maharshwe-theme-overlay.css" />
    <style>
      [data-ms-theme-toggle], .ms-theme-toggle { display: none !important; }
      .stats { gap: 14px !important; margin-top: 0 !important; }
      .stat { padding: 18px 20px !important; gap: 14px !important; align-items: flex-start !important; }
      .statIcon { width: 54px !important; height: 54px !important; flex: 0 0 54px !important; border-radius: 18px !important; margin-top: -4px !important; }
      .statIcon svg { width: 24px !important; height: 24px !important; }
      .stat p { font-size: 14px !important; line-height: 1.35 !important; }
      .stat h2 { font-size: 22px !important; margin: 4px 0 !important; }
      .icon { width: 44px !important; height: 44px !important; }
      .icon svg { width: 20px !important; height: 20px !important; }
      .quickCard svg { width: 42px !important; height: 42px !important; padding: 10px !important; }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="./brand-bootstrap.js"></script>
    <script defer src="./maharshwe-theme-overlay.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/bootstrap.jsx"></script>
  </body>
